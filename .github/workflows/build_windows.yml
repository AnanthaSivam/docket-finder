name: Build Windows executable

# Builds Docket Finder.exe on a free GitHub-hosted Windows machine —
# no Windows PC of your own needed. Runs automatically whenever you push,
# or manually from the Actions tab ("Run workflow").
on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          python -m PyInstaller `
            --name "Docket Finder" `
            --windowed `
            --onedir `
            --icon "assets/icon.ico" `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --collect-all pdfplumber `
            --collect-all reportlab `
            --noconfirm `
            app.py

      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: DocketFinder-Windows
          path: dist/Docket Finder/
